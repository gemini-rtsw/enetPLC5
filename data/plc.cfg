# Sample of what a plc config file might look like

plc5Enet plc {
# Read FPS  Data
 0 {
   ip_addr 172.16.2.26
   port 2222
   plc5_tbl_addr N10:0
   plc5_tbl_len 10
   scan_rate 1.0
   direction input
   }
# Write BFO PLC Bits  
 1 {
   ip_addr 172.16.2.26
   port 2222
   plc5_tbl_addr 0
   plc5_tbl_len 0
   scan_rate 0
   direction direct
   }
# Read FPS State Control Words
  2 {
    ip_addr 172.16.2.26
    port 2222
    plc5_tbl_addr N10:10
    plc5_tbl_len 10
    scan_rate 1.0
    direction input
    }
# Write  FPS State Control Words
  3 {
    ip_addr 172.16.2.26
    port 2222
    plc5_tbl_addr 0
    plc5_tbl_len 0
    scan_rate 1.0
    direction direct
    }
}
